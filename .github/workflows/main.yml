name: Build AltAppSwitcher on Windows

on:
  push:
    branches: [ main ]          # Change to 'master' if your default branch is master
  pull_request:
    branches: [ main ]
  workflow_dispatch:            # Allows manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          mingw-w64-x86_64-gcc          # includes g++ compiler
          mingw-w64-x86_64-make
          mingw-w64-x86_64-libgdiplus   # GDI+ support (runtime + headers)
          base-devel                    # useful build tools (make, etc.)

    - name: Add MinGW bin to PATH
      run: echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH

    - name: Build with Makefile
      shell: msys2 {0}
      run: |
        make clean || true
        make

    - name: Copy runtime DLLs (for portable exe)
      shell: msys2 {0}
      run: |
        cp /mingw64/bin/libgcc_s_seh-1.dll .
        cp /mingw64/bin/libstdc++-6.dll .
        cp /mingw64/bin/libwinpthread-1.dll .
        cp /mingw64/bin/libgdiplus-0.dll .   # GDI+ DLL if dynamically linked

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AltAppSwitcher-binaries
        path: |
          AltAppSwitcher.exe
          Settings.exe
          *.dll
        if-no-files-found: warn
