name: Build AltAppSwitcherClick on Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          git
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-libgdiplus
          mingw-w64-ucrt-x86_64-clang
          mingw-w64-ucrt-x86_64-compiler-rt
          base-devel

    - name: Add UCRT64 bin to PATH
      run: echo "C:\msys64\ucrt64\bin" >> $GITHUB_PATH

    - name: Build with Makefile (disable sanitizers + override compiler)
      shell: msys2 {0}
      run: |
        make clean || true
        make CC=gcc CXX=g++ LD=gcc
        make CC=clang CXX=clang++ LD=clang LDXX=clang++ AR=ar RANLIB=ranlib \
             CFLAGS="-O2 -g -Wall -Wextra -Wshadow -Werror -D ARCH_x86_64=1 -D NTDDI_VERSION=NTDDI_WIN10 -std=c11" \
             LDFLAGS="-static -static-libgcc -l dwmapi -l User32 -l Gdi32 -l Gdiplus -l shlwapi -l pthread -l Ole32 -l Comctl32 -l uuid"

    - name: Copy runtime DLLs for portable exe
      shell: msys2 {0}
      run: |
        cp /ucrt64/bin/libgcc_s_seh-1.dll .
        cp /ucrt64/bin/libstdc++-6.dll .
        cp /ucrt64/bin/libwinpthread-1.dll .
        cp /ucrt64/bin/libgdiplus-0.dll .

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AltAppSwitcher-binaries
        path: |
          AltAppSwitcher.exe
          Settings.exe
          *.dll
        if-no-files-found: warn
