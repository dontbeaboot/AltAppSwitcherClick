name: Build AltAppSwitcher on Windows

on:
  push:
    branches: [ main ]          # or master, depending on your default branch
  pull_request:
    branches: [ main ]
  workflow_dispatch:            # lets you trigger manually from Actions tab

jobs:
  build:
    runs-on: windows-latest     # or windows-2019 if latest fails with DLL issues

    steps:
    - uses: actions/checkout@v4

    - name: Setup MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-g++
          mingw-w64-x86_64-make
          mingw-w64-x86_64-gdiplus
          mingw-w64-x86_64-pkgconf

    - name: Add MinGW to PATH
      run: echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH

    - name: Build with Makefile
      shell: msys2 {0}
      run: |
        make clean || true
        make

    - name: Copy required DLLs (to avoid missing libgcc etc. on run)
      shell: msys2 {0}
      run: |
        cp /mingw64/bin/libgcc_s_seh-1.dll .
        cp /mingw64/bin/libstdc++-6.dll .
        cp /mingw64/bin/libwinpthread-1.dll .
        cp /mingw64/bin/libgdiplus-0.dll .   # if GDI+ is dynamically loaded

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AltAppSwitcher-binaries
        path: |
          AltAppSwitcher.exe
          Settings.exe
          *.dll
        if-no-files-found: warn
